<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>C3 Docgen Viewer</title>
	<style>
		:root {
			--bg: #090a0b;
			--fg: #e7e5e4;
			--accent: #2563EB;
			--accent-purple: #7C3AED;
			--border: #292524;
			--panel: rgb(23, 24, 28);
			--color-white: rgb(230, 230, 230);
			--color-red-400: #f87171;
			--color-orange-400: #fb923c;
			--color-green-500: #22c55e;
			color-scheme: dark;
		}

		.badge {
			display: inline-block;
			padding: 3px 12px;
			border-radius: 12px;
			font-size: 1em;
			margin-right: 6px;
			font-family: monospace;
			background: linear-gradient(180deg, #2a2d2e 0%, #1a1c1d 100%);
			border: 1px solid #3e4244;
			color: #eee;
			box-shadow: 0 1px 2px rgba(0,0,0,0.4);
			vertical-align: middle;
		}

		.visibility-badge {
			font-size: 0.7em;
			padding: 2px 6px;
			border-radius: 4px;
			vertical-align: middle;
			text-transform: uppercase;
			font-weight: bold;
			letter-spacing: 0.5px;
			border: 1px solid currentColor;
			opacity: 0.8;
			margin-right: 5px;
		}

		/* Add extra space after the last badge in a sequence */
		.visibility-badge + :not(.visibility-badge) {
			margin-left: 10px;
		}

		.vis-public {
			color: var(--color-green-500);
			border-color: rgba(34, 197, 94, 0.3);
		}

		.vis-private {
			color: var(--color-red-400);
			border-color: rgba(248, 113, 113, 0.3);
		}

		.vis-local {
			color: var(--color-orange-400);
			border-color: rgba(251, 146, 60, 0.3);
		}

		.item-visibility, .search-item-visibility {
			font-size: 0.8em;
			color: #888;
			font-family: monospace;
		}

		.hidden-sym {
			opacity: 0.6;
		}

		/* Custom Scrollbar */
		::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		::-webkit-scrollbar-track {
			background: var(--panel);
		}

		::-webkit-scrollbar-thumb {
			background: #4f4f4f;
			border-radius: 5px;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #666;
		}

		body {
			font-family: system-ui, -apple-system, sans-serif;
			margin: 0;
			display: flex;
			height: 100vh;
			background: var(--bg);
			color: var(--fg);
		}

		#sidebar {
			min-width: 320px;
			width: fit-content;
			max-width: 800px;
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			background: var(--panel);
		}

		#search-box {
			padding: 15px;
			border-bottom: 1px solid var(--border);
		}

		#search-input {
			width: 100%;
			padding: 10px;
			box-sizing: border-box;
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--fg);
			border-radius: 6px;
			outline: none;
		}

		#search-input:focus {
			border-color: var(--accent);
		}

		#list {
			flex: 1;
			overflow-y: auto;
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.item {
			padding: 10px 15px;
			border-bottom: 1px solid var(--border);
			cursor: pointer;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.item:hover,
		.item.selected {
			background: #2a2d2e;
		}

		.item-name {
			font-family: monospace;
			font-size: 0.9em;
			white-space: nowrap;
			flex: 1;
			flex-shrink: 0;
			margin-right: 8px;
		}

		.item-kind {
			font-size: 0.7em;
			padding: 3px 8px;
			border-radius: 12px;
			background: #4d4d4d;
			color: white;
			text-transform: uppercase;
			font-weight: bold;
		}

		.kind-function {
			background: #d2a8ff;
			color: #000;
		}

		.kind-macro {
			background: #ff79c6;
			color: #000;
		}

		.kind-struct {
			background: #ffa657;
			color: #000;
		}

		.kind-union {
			background: #ff8c42;
			color: #000;
		}

		.kind-bitstruct {
			background: #f8d486;
			color: #000;
		}

		.kind-enum {
			background: #4fc1ff;
			color: #000;
		}

		.kind-interface {
			background: #f5a623;
			color: #000;
		}

		.kind-module {
			background: #79b9f6;
			color: #000;
		}

		.kind-variable,
		.kind-const,
		.kind-constdef {
			background: #9cdcfe;
			color: #000;
		}

		/* C3 Syntax Highlighting Classes (GitHub Dark Theme) */
		.c3-struct,
		.c3-union,
		.c3-enum,
		.c3-bitstruct,
		.c3-typedef,
		.c3-type_alias,
		.c3-interface,
		.c3-faultdef,
		.c3-type {
			color: #ffa657;
		}

		.c3-module {
			color: #79c0ff;
		}

		.c3-macro {
			color: #d2a8ff;
		}

		.c3-keyword {
			color: #ff7b72;
		}

		.c3-function {
			color: #d2a8ff;
		}

		.c3-variable,
		.c3-const,
		.c3-constdef {
			color: #79c0ff;
		}

		.c3-string {
			color: #a5d6ff;
		}

		.c3-attribute {
			color: #8b949e;
		}

		.c3-comment {
			color: #8b949e;
		}

		.c3-number {
			color: #79c0ff;
		}

		/* General Utility Classes */
		.secondary-text {
			color: #888;
			font-size: 0.8em;
		}

		.error-text {
			color: #f48771;
		}

		.monospace {
			font-family: monospace;
		}

		.help-cursor {
			cursor: help;
		}

		.bold {
			font-weight: bold;
		}

		.built-in-type {
			border-bottom: 1px dotted #888;
		}

		.type-link {
			text-decoration: none;
			border-bottom: 1px dashed #4ec9b0;
		}

		.item-kind-function,
		.item-kind-macro {
			background: rgba(210, 168, 255, 0.07);
		}

		.item-kind-struct,
		.item-kind-union,
		.item-kind-bitstruct,
		.item-kind-enum,
		.item-kind-interface {
			background: rgba(255, 166, 87, 0.07);
		}

		.item-kind-variable,
		.item-kind-const,
		.item-kind-constdef,
		.item-kind-module {
			background: rgba(121, 192, 255, 0.07);
		}

		#content {
			flex: 1;
			padding: 30px;
			overflow-y: auto;
		}



		pre {
			background: #000;
			padding: 15px;
			border-radius: 6px;
			overflow-x: auto;
			border: 1px solid var(--border);
		}

		.header-type-info a {
			color: #aaa;
			text-decoration: underline;
			text-decoration-color: #444;
		}

		.header-pre {
			font-size: 1.1em;
			margin: 15px 0 20px 0;
			background: #111;
			padding: 14px;
			border-radius: 6px;
			border-left: 3px solid var(--accent);
			white-space: pre-wrap;
			word-break: break-all;
		}

		.header-pre.compact {
			margin-top: -2px;
		}

		code {
			font-family: monospace;
		}

		.member-list {
			list-style: none;
			padding: 0;
		}

		.member-item {
			padding: 8px;
			background: #2d2d2d;
			margin-bottom: 4px;
			border-radius: 4px;
			font-family: monospace;
			position: relative;
			border-left: 2px solid #444;
			cursor: pointer;
		}

		.member-item:hover {
			background: #3e3e3e !important;
		}

		.member-item-selected {
			background: #3e3e3e !important;
			border-left-color: var(--accent) !important;
		}

		.member-item-not-selected {
			background: transparent;
			border: none;
			padding-left: 0;
		}

		.member-link {
			text-decoration: none;
			font-size: 0.9em;
		}

		.member-link.current {
			color: #fff;
		}

		.sidebar-section-title {
			text-transform: capitalize;
			margin-top: 15px;
			font-size: 0.9em;
			color: #aaa;
			padding: 8px 15px;
			border-bottom: 1px solid var(--border);
		}

		.sidebar-member-list {
			padding-left: 10px;
			margin-left: 10px;
			border-left: 1px solid #333;
		}

		.module-contents-container { 
			padding: 40px; 
			overflow-x: auto;
		}

		.header-container {
			display: flex;
			align-items: center;
			gap: 8px;
			flex-wrap: wrap;
			margin-bottom: 8px;
		}

		.module-breadcrumb {
			color: #888;
			font-size: 1.2em;
			font-family: monospace;
		}

		.module-link {
			color: #888;
			text-decoration: none;
			border-bottom: 1px dashed #555;
		}

		.header-title {
			margin: 0;
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.interface-link {
			color: #4ec9b0;
			text-decoration: none;
			border-bottom: 1px dashed #4ec9b0;
		}

		.deprecated-box {
			background: #5a1d1d;
			padding: 10px;
			border-radius: 4px;
			margin-bottom: 20px;
		}

		.doc-text {
			margin-top: 4px;
			color: #ccc;
		}

		.sidebar-header-link {
			text-decoration: none;
			color: inherit;
			display: block;
		}

		.sidebar-header {
			padding: 16px 15px;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			gap: 12px;
			cursor: pointer;
			background: linear-gradient(135deg, #000 0%, #7C3AED 100%);
			color: white;
		}

		.sidebar-header .secondary-text {
			color: rgba(225, 225, 225, 0.7);
			font-weight: 600;
		}

		.logo {
			height: 28px;
			width: auto;
		}

		.search-stats {
			font-size: 0.8em;
			color: #888;
			margin-top: 8px;
		}

		.sidebar-nav-container {
			position: relative;
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.module-list-container {
			flex: 1;
			overflow-y: auto;
			position: relative;
		}

		.scroll-indicator {
			position: absolute;
			left: 0;
			right: 0;
			height: 50px;
			pointer-events: none;
			z-index: 10;
			transition: opacity 0.2s;
			opacity: 0;
			display: flex;
			justify-content: center;
		}

		.scroll-indicator::after {
			content: '';
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			width: 0;
			height: 0;
			border-left: 6px solid transparent;
			border-right: 6px solid transparent;
			opacity: 0.8;
		}

		.scroll-indicator-top {
			top: 0;
			background: linear-gradient(to top, transparent 0%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0.9) 100%);
		}

		.scroll-indicator-top::after {
			top: 8px;
			border-bottom: 6px solid var(--accent);
		}

		.scroll-indicator-bottom {
			bottom: 0;
			background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 50%, transparent 100%);
		}

		.scroll-indicator-bottom::after {
			bottom: 8px;
			border-top: 6px solid var(--accent);
		}

		.search-results-overlay {
			background: var(--panel);
			display: none;
			flex: 1;
			overflow-y: auto;
			position: relative;
			z-index: 20;
		}

		.main-content {
			flex: 1;
			min-width: 0;
		}

		.right-sidebar {
			width: 350px;
			border-left: 1px solid var(--border);
			background: var(--panel);
			display: none;
			flex-direction: column;
			position: relative;
		}

		.right-sidebar-title {
			padding: 15px;
			border-bottom: 1px solid var(--border);
			font-weight: bold;
			color: var(--accent);
			font-family: monospace;
			font-size: 0.9em;
			word-break: break-all;
		}

		.right-sidebar-content {
			flex: 1;
			overflow-y: auto;
			padding: 15px;
		}

		.doc-section-list {
			margin-bottom: 20px !important;
		}

		.doc-returns {
			font-size: 1.05em;
			margin-bottom: 20px;
		}

		.doc-description {
			font-size: 1.05em;
			line-height: 1.6;
		}

		.targets-badge {
			font-size: 0.85em;
			color: #666;
			font-family: monospace;
			padding: 1px 4px;
			border: 1px solid #222;
			display: inline-block;
			border-radius: 2px;
			border-bottom: none;
			background: #111;
		}

		.variant-separator {
			border: 0;
			border-top: 1px solid var(--border);
			margin: 40px 0;
			opacity: 0.5;
		}

		.module-list-ul {
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.module-list-ul li {
			padding: 8px 15px;
			cursor: pointer;
		}

		.module-list-ul li:nth-child(even) {
			background: rgba(255, 255, 255, 0.03);
		}

		.module-list-ul li:hover {
			background: rgba(255, 255, 255, 0.1) !important;
		}

		.module-list-ul li.selected {
			background: rgba(255, 255, 255, 0.1) !important;
			border-left: 2px solid var(--accent);
		}

		.overview-title {
			margin-bottom: 8px;
		}

		.overview-subtitle {
			color: #888;
			margin-bottom: 30px;
		}

		.overview-groups {
			column-width: 300px;
			column-gap: 40px;
			column-fill: auto;
			max-height: 80vh;
			margin-top: 30px;
		}

		.variant-info-flex {
			display: flex;
			flex-wrap: wrap;
			gap: 60px;
			margin-top: 20px;
			margin-bottom: 30px;
			align-items: flex-start;
			justify-content: flex-start;
		}

		.info-column {
			flex: 1;
			min-width: 350px;
			max-width: 900px;
		}

		.contract-table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 10px;
			font-size: 0.95em;
		}

		.contract-table th {
			text-align: left;
			color: #888;
			font-weight: normal;
			border-bottom: 1px solid #333;
			padding: 8px;
			text-transform: uppercase;
			font-size: 0.8em;
			letter-spacing: 1px;
		}

		.contract-table td {
			padding: 10px 8px;
			border-bottom: 1px solid #222;
			vertical-align: top;
		}

		.contract-table tr:last-child td {
			border-bottom: none;
		}

		.col-mod { width: 80px; }
		.col-type { width: 180px; }
		.col-name { width: 150px; }

		.arg-mod-badge {
			font-size: 0.75em;
			padding: 2px 5px;
			border-radius: 3px;
			background: #222;
			color: #aaa;
			text-transform: uppercase;
			font-weight: bold;
			margin-right: 4px;
		}

		.arg-mod-in { color: var(--color-green-500); border: 1px solid rgba(34, 197, 94, 0.2); }
		.arg-mod-out { color: var(--color-red-400); border: 1px solid rgba(248, 113, 113, 0.2); }
		.arg-mod-ref { color: var(--color-orange-400); border: 1px solid rgba(251, 146, 60, 0.2); }

		.info-column h3 {
			margin-top: 0 !important;
		}

		.module-group {
			margin-bottom: 30px;
			break-inside: auto;
			display: block;
			width: 100%;
		}

		.module-group-title {
			font-family: monospace;
			font-size: 1.1em;
			font-weight: bold;
			color: #888; /* Fallback */
			border-bottom: 1px solid var(--border);
			padding-bottom: 8px;
			margin-bottom: 12px;
			text-transform: uppercase;
			letter-spacing: 1px;
			break-after: avoid;
		}

		/* Category Specific Colors */
		.group-function .module-group-title { color: #d2a8ff; }
		.group-macro .module-group-title { color: #d2a8ff; }
		.group-struct .module-group-title, 
		.group-union .module-group-title,
		.group-enum .module-group-title,
		.group-bitstruct .module-group-title,
		.group-typedef .module-group-title,
		.group-type_alias .module-group-title { color: #ffa657; }
		.group-faultdef .module-group-title { color: #f48771; }
		.group-variable .module-group-title,
		.group-const .module-group-title,
		.group-constdef .module-group-title { color: #79c0ff; }
		.group-interface .module-group-title { color: #ffa657; }

		.module-group-list {
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.module-row {
			cursor: pointer;
			padding: 4px 8px;
			border-radius: 4px;
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.module-row:hover {
			background: rgba(255, 255, 255, 0.05);
		}

		.module-row-name {
			font-family: monospace;
			font-size: 1.05em;
			font-weight: bold;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.module-tooltip {
			position: fixed;
			background: var(--panel);
			border: 1px solid var(--accent);
			padding: 16px 24px;
			border-radius: 8px;
			z-index: 2000;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
			max-width: 500px;
			max-height: calc(100vh - 60px);
			overflow-y: auto;
			scrollbar-width: none;
			width: auto;
			display: none;
			pointer-events: none;
			font-size: 0.95em;
			line-height: 1.5;
		}

		.module-tooltip.show {
			display: block;
		}

		.module-tooltip.top-left {
			top: 30px;
			left: 30px;
		}

		.module-tooltip.top-right {
			top: 30px;
			right: 30px;
		}

		.module-tooltip.bottom-left {
			bottom: 30px;
			left: 30px;
		}

		.module-tooltip.bottom-right {
			bottom: 30px;
			right: 30px;
		}

		.module-tooltip-title {
			color: var(--accent);
			font-weight: bold;
			font-family: monospace;
			margin-bottom: 8px;
			font-size: 1.1em;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			padding-bottom: 4px;
		}

	</style>
</head>

<body>
	<div id="module-tooltip" class="module-tooltip"></div>
	<div id="sidebar">
		<a href="#" onclick="event.preventDefault(); navigateTo('');" class="sidebar-header-link">
			<div class="sidebar-header">
				<img src="https://c3-lang.org/logo.svg" alt="C3 Logo" class="logo">
				<span class="secondary-text">Documentation</span>
			</div>
		</a>
		<div id="search-box">
			<input type="text" id="search-input" placeholder="Start typing to search...">
		</div>
		<div class="sidebar-nav-container">
			<div id="mod-indicator-top" class="scroll-indicator scroll-indicator-top"></div>
			<div id="module-list" class="module-list-container"></div>
			<div id="mod-indicator-bottom" class="scroll-indicator scroll-indicator-bottom"></div>
			<ul id="list" class="search-results-overlay"></ul>
		</div>
	</div>

	<div id="content" class="main-content"></div>

	<div id="right-sidebar" class="right-sidebar">
		<div id="ctx-indicator-top" class="scroll-indicator scroll-indicator-top"></div>
		<div id="right-sidebar-content" class="right-sidebar-content"></div>
		<div id="ctx-indicator-bottom" class="scroll-indicator scroll-indicator-bottom"></div>
	</div>

	<script>
		let allDecls = [];
		let selectedIndex = -1;
		let currentRendered = [];
		let currentFiltered = [];

		const BUILTINS = {
			"ichar": "signed 8-bit integer",
			"short": "signed 16-bit integer",
			"int": "signed 32-bit integer",
			"long": "signed 64-bit integer",
			"int128": "signed 128-bit integer",
			"iptr": "signed pointer-sized integer",
			"isz": "signed pointer-sized integer",
			"sz": "signed pointer-sized integer",
			"char": "unsigned 8-bit integer",
			"ushort": "unsigned 16-bit integer",
			"uint": "unsigned 32-bit integer",
			"ulong": "unsigned 64-bit integer",
			"uint128": "unsigned 128-bit integer",
			"uptr": "unsigned pointer-sized integer",
			"usz": "unsigned pointer-sized integer",

		const KIND_PRIORITY = {
			'function': 1,
			'macro': 2,
			'struct': 3,
			'union': 4,

		function showTooltip(uid, event) {
			const target = allDecls.find(d => d.uid === uid);
			let docText = target && target.docs && target.docs.text ? target.docs.text : '';
			if (!docText) return;

			const tooltip = document.getElementById('module-tooltip');

			// Position in opposite corner
			const x = event.clientX;
			const y = event.clientY;
			const vw = window.innerWidth;
			const vh = window.innerHeight;

			tooltip.className = 'module-tooltip'; // Reset
			if (x < vw / 2) {
				tooltip.classList.add(y < vh / 2 ? 'bottom-right' : 'top-right');
			} else {
				tooltip.classList.add(y < vh / 2 ? 'bottom-left' : 'top-left');
			}

			tooltip.innerHTML = `
				<div class="module-tooltip-title">${uid}</div>
				<div class="module-tooltip-content">${formatDocText(docText)}</div>
			`;
			tooltip.classList.add('show');
		}

		function hideTooltip() {
			document.getElementById('module-tooltip').classList.remove('show');
		}

		const EMBEDDED_JSON_LIST = [];
		/*DATA_START*/
		/*DATA_END*/

		async function loadTargetFiles() {
			if (EMBEDDED_JSON_LIST.length > 0) {
				for (const item of EMBEDDED_JSON_LIST) {
					mergeTargetData(item.data, item.target);
				}
				return true;
			}
			return false;
		}

		function mergeTargetData(data, targetName) {
			for (const [moduleName, mod] of Object.entries(data.modules)) {
				addOrMergeDeclaration({
					name: moduleName,
					kind: 'module',
					uid: moduleName,
					visibility: 'public',
					docs: mod.docs,
					moduleName: moduleName,
					targetName: targetName === 'docs' ? 'default' : targetName
				});

				['functions', 'macros', 'types', 'variables'].forEach(cat => {
					if (mod[cat]) {
						mod[cat].forEach(decl => {
							decl.moduleName = moduleName;
							decl.targetName = targetName === 'docs' ? 'default' : targetName;
							addOrMergeDeclaration(decl);
						});
					}
				});
			}
		}

		function addOrMergeDeclaration(decl) {
			const cleanDecl = { ...decl };
			delete cleanDecl.targetName;
			const declJson = JSON.stringify(cleanDecl);

			let existing = allDecls.find(d => d.uid === decl.uid);
			if (!existing) {
				allDecls.push(decl);
				return;
			}

			if (!existing.variants) {
				const cleanExisting = { ...existing };
				delete cleanExisting.variants;
				delete cleanExisting.targetName;
				existing.variants = [{
					targets: [existing.targetName],
					decl: existing,
					json: JSON.stringify(cleanExisting)
				}];
			}

			let found = existing.variants.find(v => v.json === declJson);
			if (found) {
				if (!found.targets.includes(decl.targetName)) {
					found.targets.push(decl.targetName);
				}
			} else {
				existing.variants.push({
					targets: [decl.targetName],
					decl: decl,
					json: declJson
				});
			}
		}

		function renderModules() {
			const modules = allDecls.filter(d => d.kind === 'module').sort((a, b) => a.uid.localeCompare(b.uid));
			const container = document.getElementById('module-list');
			let html = '<h3 class="sidebar-section-title">Modules</h3>';
			html += '<ul class="module-list-ul">';
			modules.forEach(m => {
				html += `<li class="item" data-mod="${m.uid}" onclick="closeSearch(); navigateTo('${m.uid}', true)">
					<span class="item-name c3-module">${m.uid}</span>
				</li>`;
			});
			html += '</ul>';
			container.innerHTML = html;
		}

		function renderModuleOverview() {
			document.querySelectorAll('.module-list-ul li').forEach(li => li.classList.remove('selected'));
			const content = document.getElementById('content');
			content.scrollTop = 0;
			const moduleNames = [...new Set(allDecls.map(d => d.moduleName))].sort();

			// Group modules by top-level namespace
			const groups = {};
			moduleNames.forEach(m => {
				const parts = m.split('::');
				const top = parts[0];
				if (!groups[top]) groups[top] = [];
				groups[top].push(m);
			});

			let html = `
				<h1 class="overview-title">Project Overview</h1>
				<p class="overview-subtitle">Modules grouped by namespace.</p>
				<div class="overview-groups">
			`;

			Object.entries(groups).sort().forEach(([top, mods]) => {
				html += `
					<div class="module-group">
						<div class="module-group-title">${top}</div>
						<div class="module-group-list">
				`;
				mods.forEach(m => {
					const display = m.startsWith(top + '::') ? m.slice(top.length + 2) : m;

					html += `
						<div class="module-row"
							 onclick="hideTooltip(); navigateTo('${m}')"
							 onmouseenter="showTooltip('${m}', event)"
							 onmouseleave="hideTooltip()">
							<span class="module-row-name">${display}</span>
						</div>
					`;
				});
				html += `
						</div>
					</div>
				`;
			});

			html += '</div>';
			content.innerHTML = html;
			document.getElementById('right-sidebar').style.display = 'none';
		}

		async function init() {
			try {
				const loadedAny = await loadTargetFiles();
				if (!loadedAny) throw new Error("Documentation JSON payload is missing.");

				renderModules();

				// On initial load, navigate to the uid in the URL hash if present
				const initialHash = decodeURIComponent(location.hash.slice(1));
				if (initialHash) {
					const target = allDecls.find(d => d.uid === initialHash);
					if (target) { renderDetails(target); } else { renderModuleOverview(); }
				} else {
					renderModuleOverview();
				}

				bindEvents();
			} catch (e) {
				document.getElementById('content').innerHTML = `
					<h2 class="error-text">Error: Documentation data missing</h2>
					<p class="error-text monospace">${e.message}</p>
					<p>Make sure you run <code>c3c docgen</code> to properly generate and embed the documentation data within this file.</p>
				`;
				document.getElementById('stats').innerText = "Failed to load.";
			}
		}

		function closeSearch() {
			const input = document.getElementById('search-input');
			input.value = '';
			const list = document.getElementById('list');
			list.style.display = 'none';
			document.getElementById('module-list').style.display = 'block';
			list.innerHTML = '';
			selectedIndex = -1;
			currentRendered = [];
			currentFiltered = [];
		}

		function makeListItem(d, index) {
			const li = document.createElement('li');
			li.className = `item item-kind-${d.kind || 'other'}` + (d.visibility !== 'public' ? ' hidden-sym' : '');
			let kindClass = `item-kind`;
			if (d.kind === 'function') kindClass += ' kind-function';
			else if (d.kind === 'macro') kindClass += ' kind-macro';
			else if (d.kind === 'struct') kindClass += ' kind-struct';
			else if (d.kind === 'enum') kindClass += ' kind-enum';
			const vis = d.visibility || 'public';
			const visLabel = vis !== 'public' ? `<span class="item-visibility">[${vis}]</span>` : '';

			li.innerHTML = `
				<span class="item-name c3-${d.kind}">${d.uid} ${visLabel}</span>
				<span class="${kindClass}">${d.kind}</span>
			`;
			li.onclick = () => { closeSearch(); navigateTo(d.uid); };
			return li;
		}

		function appendToList(newLimit) {
			const list = document.getElementById('list');
			// Remove the "... and X more" footer before appending
			const footer = list.querySelector('.list-footer');
			if (footer) footer.remove();

			for (let i = currentRendered.length; i < newLimit; i++) {
				const d = currentFiltered[i];
				currentRendered.push(d);
				list.appendChild(makeListItem(d, i));
			}

			// Re-add footer if there are still more items
			if (currentFiltered.length > currentRendered.length) {
				const footer = document.createElement('li');
				footer.className = 'item list-footer';
				footer.style.justifyContent = 'center';
				footer.style.color = '#888';
				footer.innerText = `... and ${currentFiltered.length - currentRendered.length} more`;
				list.appendChild(footer);
			}
		}

		function highlightItem(index) {
			selectedIndex = index;
			const list = document.getElementById('list');
			const items = list.querySelectorAll('.item:not(.list-footer)');
			items.forEach((el, i) => el.classList.toggle('selected', i === index));
			if (items[index]) items[index].scrollIntoView({ block: 'nearest' });
		}

		function renderList(items) {
			selectedIndex = -1;
			currentRendered = [];
			currentFiltered = items;
			const list = document.getElementById('list');
			list.innerHTML = '';
			list.style.display = 'block';
			document.getElementById('module-list').style.display = 'none';

			// Lazy DOM rendering: start with first 50, expand on demand via arrow keys
			const limit = Math.min(items.length, 50);
			for (let i = 0; i < limit; i++) {
				const d = items[i];
				currentRendered.push(d);
				list.appendChild(makeListItem(d, i));
			}

			if (items.length > limit) {
				const footer = document.createElement('li');
				footer.className = 'item list-footer';
				footer.style.justifyContent = 'center';
				footer.style.color = '#888';
				footer.innerText = `... and ${items.length - limit} more`;
				list.appendChild(footer);
			}
		}

		function escapeHtml(s) {
			return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		}

		function formatDocText(text) {
			const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');


			let html = '';
			let inCode = false;
			let pOpen = false;

			for (const rawLine of lines) {
				const trimmed = rawLine.trim();

				if (!inCode && trimmed.startsWith('```')) {
					if (pOpen) { html += '</p>'; pOpen = false; }
					inCode = true;
					html += '<pre><code>';
				} else if (inCode && trimmed === '```') {
					inCode = false;
					html += '</code></pre>';
				} else if (inCode) {
					// Remove 1 leading space often present in C3 doc blocks
					const outLine = rawLine.startsWith(' ') ? rawLine.substring(1) : rawLine;
					html += escapeHtml(outLine) + '\n';
				} else {
					if (trimmed === '') {
						if (pOpen) { html += '</p>'; pOpen = false; }
					} else {
						if (!pOpen) { html += '<p>'; pOpen = true; }
						else { html += '<br>'; }
						const outLine = rawLine.startsWith(' ') ? rawLine.substring(1) : rawLine;
						html += escapeHtml(outLine);
					}
				}
			}

			if (pOpen) html += '</p>';
			return html;
		}

		function navigateTo(uid, skipSidebarScroll = false) {
			closeSearch();
			if (!uid) {
				history.pushState({ uid: null }, '', window.location.pathname);
				renderModuleOverview();
				return;
			}
			const target = allDecls.find(d => d.uid === uid);
			if (target) {
				history.pushState({ uid: uid }, '', '#' + uid);
				renderDetails(target, skipSidebarScroll);
			}
		}

		function bindEvents() {
			document.getElementById('search-input').addEventListener('input', (e) => {
				const rawQ = e.target.value.toLowerCase().trim();
				const q = rawQ.replace(/\s+/g, '');
				const listEl = document.getElementById('list');

				if (!q) {
					listEl.style.display = 'none';
					document.getElementById('module-list').style.display = 'block';
					// Restore center overview if no item is currently selected via hash
					if (!location.hash.slice(1)) renderModuleOverview();
					return;
				}

				listEl.style.display = 'block';
				document.getElementById('module-list').style.display = 'none';

				function getFuzzyScore(text, query) {
					let textIdx = 0;
					let queryIdx = 0;
					let score = 0;
					let consecutive = 0;

					const tLow = text.toLowerCase();
					const qLow = query;

					while (textIdx < tLow.length && queryIdx < qLow.length) {
						if (tLow[textIdx] === qLow[queryIdx]) {
							score += 10 + (consecutive * 5);
							consecutive++;
							queryIdx++;
						} else {
							consecutive = 0;
							score -= 1;
						}
						textIdx++;
					}
					return queryIdx === qLow.length ? score : 0;
				}

				const filtered = allDecls
					.map(d => {
						let score = 0;
						const nameLower = d.name.toLowerCase();
						const uidLower = d.uid.toLowerCase();

						if (nameLower === rawQ) score = 10000;
						else if (nameLower.startsWith(rawQ)) score = 5000;
						else if (nameLower.includes(rawQ)) score = 1000;
						else score = getFuzzyScore(d.uid, q);

						if (score > 0) {
							if ((d.visibility || 'public') === 'public') score += 20000;
							if (d.kind === 'module') score += 100000; // Prioritize modules
							if (d.uid.startsWith('std::core')) score += 50;
							return { d, score };
						}
						return null;
					})
					.filter(x => x !== null)
					.sort((a, b) => b.score - a.score || a.d.name.length - b.d.name.length)
					.map(x => x.d);

				renderList(filtered);

				// Auto-select the first match, no history push (user is still typing)
				if (filtered.length > 0) {
					renderDetails(filtered[0]);
					highlightItem(0);
				}
			});

			// Global keydown: arrow keys work regardless of focus; typing anywhere focuses the search box
			document.addEventListener('keydown', (e) => {
				const input = document.getElementById('search-input');
				const list = document.getElementById('list');
				const isSearching = list.style.display !== 'none';

				if ((e.key === 'ArrowDown' || e.key === 'PageDown') && isSearching) {
					e.preventDefault();
					const step = e.key === 'PageDown' ? 10 : 1;
					const next = selectedIndex + step;
					if (next >= currentRendered.length && currentRendered.length < currentFiltered.length) {
						appendToList(Math.min(currentFiltered.length, currentRendered.length + 50));
					}
					const clamped = Math.min(next, currentRendered.length - 1);
					if (clamped >= 0) { highlightItem(clamped); renderDetails(currentRendered[clamped]); }
				} else if ((e.key === 'ArrowUp' || e.key === 'PageUp') && isSearching) {
					e.preventDefault();
					const step = e.key === 'PageUp' ? 10 : 1;
					const prev = Math.max(selectedIndex - step, 0);
					highlightItem(prev);
					renderDetails(currentRendered[prev]);
				} else if ((e.key === 'Enter' || e.key === 'Escape') && isSearching) {
					e.preventDefault();
					if (selectedIndex >= 0) {
						const uid = currentRendered[selectedIndex].uid;
						closeSearch();
						navigateTo(uid);
					} else {
						closeSearch();
					}
				} else if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
					if (document.activeElement !== input) {
						input.focus();
					}
				}
			});

			document.getElementById('list').addEventListener('scroll', (e) => {
				const list = e.target;
				if (list.scrollHeight - list.scrollTop - list.clientHeight < 100) {
					if (currentRendered.length < currentFiltered.length) {
						appendToList(Math.min(currentFiltered.length, currentRendered.length + 50));
					}
				}
			});

			const modContainer = document.getElementById('module-list');
			const updateModIndicators = () => {
				const top = document.getElementById('mod-indicator-top');
				const bottom = document.getElementById('mod-indicator-bottom');
				top.style.opacity = modContainer.scrollTop > 10 ? '1' : '0';
				const remaining = modContainer.scrollHeight - modContainer.scrollTop - modContainer.clientHeight;
				bottom.style.opacity = remaining > 10 ? '1' : '0';
			};
			modContainer.addEventListener('scroll', updateModIndicators);
			// Initial check
			setTimeout(updateModIndicators, 100);

			// Handle browser back/forward buttons
			window.addEventListener('popstate', (e) => {
				const uid = (e.state && e.state.uid) || window.location.hash.slice(1);
				if (uid) {
					const target = allDecls.find(d => d.uid === uid);
					if (target) renderDetails(target);
					else renderModuleOverview();
				} else {
					renderModuleOverview();
				}
			});
		}


		function renderParams(params) {
			return (params || []).map(m => {
				if (m.kind === 'body_param') {
					const bodyParams = renderParams(m.params);
					return `<span class="c3-keyword">@body</span>(${bodyParams})`;
				}
				const name = m.name ? `<span class="c3-variable">${m.is_ref ? '&' : ''}${m.name}</span>` : (m.is_ref ? '&' : '');
				const type = renderTypeName(m.type);
				let res = `${name} : ${type}`;
				if (m.attributes) res += ` <span class="c3-attribute">${m.attributes.join(' ')}</span>`;
				if (m.default_value) res += ` = <span class="c3-string">${m.default_value}</span>`;
				return res;
			}).join(', ');
		}

		function buildSignature(d) {
			const lastSep = d.uid.lastIndexOf('::');
			const localName = lastSep >= 0 ? d.uid.slice(lastSep + 2) : d.uid;

			if (d.kind === 'function' || d.kind === 'macro') {
				const keyword = d.kind === 'macro' ? 'macro' : 'fn';
				const params = renderParams(d.members);
				const ret = d.return_type ? renderTypeName(d.return_type) : 'void';
				const attrs = (d.attributes || []).map(a => `<span class="c3-attribute">${a}</span>`).join(' ');
				return `<span class="c3-keyword">${keyword}</span> ${ret} <span class="c3-function">${localName}</span>(${params})${attrs ? ' ' + attrs : ''}`;
			}

			if (d.kind === 'type_alias' && d.return_type) {
				const ret = renderTypeName(d.return_type);
				const params = renderParams(d.members);
				return `<span class="c3-keyword">alias</span> <span class="c3-type">${localName}</span> = <span class="c3-keyword">fn</span> ${ret}(${params})`;
			}

			if (d.kind === 'variable') {
				const keyword = d.is_const ? 'const' : 'var';
				const typeStr = d.type ? renderTypeName(d.type) : '';
				return `<span class="c3-keyword">${keyword}</span> ${typeStr} <span class="c3-variable">${localName}</span>`;
			}

			return null;
		}

		function buildHeaderHtml(d, vd) {
			let html = `<div class="header-container">`;
			html += `<span class="module-breadcrumb">Module: `;
			html += `<a href="#" onclick="navigateTo('${d.moduleName}'); return false;"
						class="module-link"
						title="Go to module ${d.moduleName}">${d.moduleName}</a>`;
			html += `</span>`;

			const kindClass = `kind-${d.kind}`;
			html += `<span class="badge ${kindClass}">${d.kind}</span>`;

			const vis = d.visibility || 'public';
			if (vis !== 'public') {
				const visClass = `vis-${vis}`;
				html += `<span class="visibility-badge ${visClass}">${vis}</span>`;
			}

			if (d.attributes) {
				d.attributes.forEach(a => html += `<span class="badge">${a}</span>`);
			}
			if (d.custom_attrs) {
				d.custom_attrs.forEach(a => html += `<span class="badge c3-attribute">@${a.name}</span>`);
			}
			html += `</div>`;

			const lastSep = d.uid.lastIndexOf('::');
			const localName = lastSep >= 0 ? d.uid.slice(lastSep + 2) : d.uid;
			html += `<div style="margin-bottom: 25px;">`;
			html += `<h1 class="header-title">${localName}</h1>`;
			
			if (vd) {
				let typeInfo = '';
				if (vd.return_type) {
					typeInfo += ` <span style="font-size: 0.8em; opacity: 0.7;">Returns:</span> ${renderTypeName(vd.return_type)}`;
				}
				if (vd.base_type) {
					typeInfo += ` (base: ${renderTypeName(vd.base_type)})`;
				}
				if (vd.interfaces && vd.interfaces.length > 0) {
					const ifaces = vd.interfaces.map(i => {
						if (i.uid) return `<a href="#" onclick="navigateTo('${i.uid}'); return false;">${i.name}</a>`;
						return i.name;
					}).join(', ');
					typeInfo += ` <span style="font-size: 0.8em; opacity: 0.8; font-family: sans-serif;">implements ${ifaces}</span>`;
				}
				if (typeInfo) {
					html += `<span class="header-type-info">${typeInfo}</span>`;
				}
			}
			html += `</div>`;

			return html;
		}

		function renderTypeName(typeObj) {
			if (!typeObj) return `<span class="c3-type">void</span>`;

			const name = typeObj.name;
			const baseName = name.replace(/\[.*?\]/g, '').replace(/[\*\?]/g, '').trim();
			let tooltip = BUILTINS[baseName];

			if (tooltip) {
				if (name !== baseName) {
					let prefix = '';
					let suffix = name.substring(baseName.length);
					const mods = suffix.match(/\[<.*?>\]|\[.*?\]|\*|\?/g) || [];
					for (let i = mods.length - 1; i >= 0; i--) {
						const mod = mods[i];
						if (mod === '*') prefix += 'pointer to ';
						else if (mod === '?') prefix += 'optional ';
						else if (mod === '[]') prefix += 'slice of ';
						else if (mod === '[*]') prefix += 'inferred array of ';
						else if (mod === '[<*>]') prefix += 'inferred vector of ';
						else if (mod.startsWith('[<')) prefix += 'vector of ';
						else prefix += 'array of ';
					}
					tooltip = prefix + tooltip;
				}
				return `<span class="c3-type built-in-type help-cursor" title="built-in: ${tooltip}">${typeObj.name}</span>`;
			}

			if (typeObj.uid) {
				return `<a href="#" onclick="navigateTo('${typeObj.uid}'); return false;" class="c3-type type-link" title="${typeObj.uid}">${typeObj.name}</a>`;
			}

			return `<span class="c3-type">${typeObj.name}</span>`;
		}



		function buildMembersHtml(vd, baseDocs) {
			const isFunction = vd.kind === 'function' || vd.kind === 'macro' || (vd.kind === 'type_alias' && vd.return_type);
			const title = isFunction ? 'Arguments' : 'Fields';
			
			if (!vd.members || vd.members.length === 0) return '';

			let html = `<h3>${title}</h3>`;
			html += `<table class="contract-table">
				<thead>
					<tr>
						${isFunction ? '<th class="col-mod">Contract</th>' : ''}
						<th class="col-type">Type</th>
						<th class="col-name">Name</th>
						<th>Description</th>
					</tr>
				</thead>
				<tbody>`;

			vd.members.forEach(m => {
				// Find matching doc param if any
				const docParam = (baseDocs && baseDocs.params) ? baseDocs.params.find(p => p.name === m.name) : null;
				
				let modHtml = '';
				if (isFunction) {
					if (docParam) {
						if (docParam.modifier) modHtml += `<span class="arg-mod-badge arg-mod-${docParam.modifier}">${docParam.modifier}</span>`;
						if (docParam.by_ref) modHtml += `<span class="arg-mod-badge arg-mod-ref">ref</span>`;
					}
					modHtml = modHtml || '<span class="secondary-text">—</span>';
				}

				let bitDesc = '';
				if (m.bit_range) {
					bitDesc = `<br><span class="secondary-text" style="font-size: 0.8em;">bits ${m.bit_range[0]}..${m.bit_range[1]}</span>`;
				}

				const desc = (docParam && docParam.description) ? docParam.description : '';

				html += `<tr>
					${isFunction ? `<td>${modHtml}</td>` : ''}
					<td class="monospace">${renderTypeName(m.type)}${bitDesc}</td>
					<td class="monospace bold c3-${m.kind || 'variable'}">${m.name}</td>
					<td class="doc-text">${desc}</td>
				</tr>`;
			});

			html += `</tbody></table>`;
			return html;
		}


		function buildDocsBodyHtml(d) {
			if (!d || !d.docs) return '';
			let html = '';
			if (d.docs.deprecated) {
				html += `<div class="deprecated-box"><strong>Deprecated:</strong> ${d.docs.deprecated}</div>`;
			}
			if (d.docs.text) {
				html += `<h3>Description</h3>`;
				if (d.kind === 'module') {
					html += `<pre class="header-pre" style="white-space: pre-wrap;">${escapeHtml(d.docs.text)}</pre>`;
				} else {
					html += `<div class="doc-description">${formatDocText(d.docs.text)}</div>`;
				}
			}
			return html;
		}

		function buildVariantHtml(vd, localName, targets, baseDocs) {
			const sig = buildSignature(vd);
			const headerText = sig || localName;
			let html = '';

			const targetsStr = (targets || []).join(', ');
			if (targetsStr) {
				html += `<div class="targets-badge">${targetsStr}</div>`;
			}

			const isCompact = !baseDocs || (!baseDocs.text && !baseDocs.return && (!baseDocs.params || baseDocs.params.length === 0));
			html += `<pre class="header-pre ${isCompact ? 'compact' : ''}">${headerText}</pre>`;

			html += '<div class="variant-info-flex">';
			
			const membersInfo = buildMembersHtml(vd, baseDocs);
			if (membersInfo) html += `<div class="info-column">${membersInfo}</div>`;
			
			html += '</div>';

			html += buildDocsBodyHtml(vd);

			return html;
		}

		function renderDetails(d, skipSidebarScroll = false) {
			const lastSep = d.uid.lastIndexOf('::');
			const localName = lastSep >= 0 ? d.uid.slice(lastSep + 2) : d.uid;

			let html = d.kind === 'module' ? '' : buildHeaderHtml(d, d);

			const variantsToRender = (d.variants && d.variants.length > 1)
				? d.variants.map(v => ({ targets: v.targets, decl: v.decl }))
				: [{ targets: [], decl: d }];

			if (d.kind !== 'module') {
				html += `<div>`;
				for (let i = 0; i < variantsToRender.length; i++) {
					const variant = variantsToRender[i];
					if (i > 0) html += '<hr class="variant-separator">';
					html += buildVariantHtml(variant.decl, localName, variant.targets, d.docs);
				}
				html += `</div>`;
			}



			const content = document.getElementById('content');
			content.scrollTop = 0;
			const rightSidebar = document.getElementById('right-sidebar');
			const rightSidebarContent = document.getElementById('right-sidebar-content');

			const renderModuleContext = (moduleName, isSidebar = false) => {
				const modMembers = allDecls.filter(m => m.moduleName === moduleName && m.kind !== 'module');
				let ctxHtml = '';
				if (modMembers.length > 0) {
					const groups = {};
					modMembers.forEach(m => {
						const k = m.kind || 'other';
						if (!groups[k]) groups[k] = [];
						groups[k].push(m);
					});

					const sortedKinds = Object.keys(groups).sort((a, b) => {
						const pa = KIND_PRIORITY[a] || 99;
						const pb = KIND_PRIORITY[b] || 99;
						if (pa !== pb) return pa - pb;
						return a.localeCompare(b);
					});
					if (!isSidebar) {
						let maxLen = 0;
						modMembers.forEach(m => {
							const mLocal = m.uid.slice(m.uid.lastIndexOf('::') + 2);
							if (mLocal.length > maxLen) maxLen = mLocal.length;
						});
						// 9px per char approx + badges space
						const idealWidth = Math.max(250, Math.min(600, maxLen * 9 + 60));
						ctxHtml += `<div class="overview-groups" style="column-width: ${idealWidth}px;">`;
					}

					for (const k of sortedKinds) {
						const title = k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' ') + 's';

						if (isSidebar) {
							ctxHtml += `<h3 class="sidebar-section-title">${title}</h3>`;
							ctxHtml += `<ul class="member-list group-list sidebar-member-list">`;
							groups[k].sort((a, b) => a.uid.localeCompare(b.uid)).forEach(m => {
								const mLocal = m.uid.slice(m.uid.lastIndexOf('::') + 2);
								const isCurrent = m.uid === d.uid;
								ctxHtml += `<li class="member-item ${isCurrent ? 'member-item-selected' : 'member-item-not-selected'}" onclick="navigateTo('${m.uid}')">
									<a href="#" onclick="event.preventDefault(); event.stopPropagation(); navigateTo('${m.uid}');" class="member-link ${isCurrent ? 'current' : ''} c3-${m.kind}">${mLocal}</a>
								</li>`;
							});
							ctxHtml += `</ul>`;
						} else {
							ctxHtml += `<div class="module-group group-${k}">
								<div class="module-group-title">${title}</div>
								<div class="module-group-list">`;
							groups[k].sort((a, b) => a.uid.localeCompare(b.uid)).forEach(m => {
								const mLocal = m.uid.slice(m.uid.lastIndexOf('::') + 2);
								const visBadge = m.visibility && m.visibility !== 'public' ? `<span class="item-visibility">[${m.visibility}]</span>` : '';
								const hiddenClass = m.visibility && m.visibility !== 'public' ? ' hidden-sym' : '';
								ctxHtml += `
									<div class="module-row${hiddenClass}"
										 onclick="hideTooltip(); navigateTo('${m.uid}')"
										 onmouseenter="showTooltip('${m.uid}', event)"
										 onmouseleave="hideTooltip()">
										<span class="module-row-name c3-${m.kind}">${mLocal} ${visBadge}</span>
									</div>`;
							});
							ctxHtml += `</div></div>`;
						}
					}
					if (!isSidebar) ctxHtml += '</div>';
				}
				return ctxHtml;
			};

			const updateCtxIndicators = () => {
				const top = document.getElementById('ctx-indicator-top');
				const bottom = document.getElementById('ctx-indicator-bottom');
				top.style.opacity = rightSidebarContent.scrollTop > 10 ? '1' : '0';
				const remaining = rightSidebarContent.scrollHeight - rightSidebarContent.scrollTop - rightSidebarContent.clientHeight;
				bottom.style.opacity = remaining > 10 ? '1' : '0';
			};

			if (d.kind === 'module') {
				rightSidebar.style.display = 'none';
				html += `<div class="module-contents-container" style="max-width: 95%;">`;
				html += `<h1 class="overview-title">Module: ${d.name}</h1>`;
				html += buildDocsBodyHtml(d);
				html += renderModuleContext(d.name, false);
				html += `</div>`;
			} else {
				rightSidebar.style.display = 'flex';
				rightSidebarContent.innerHTML = renderModuleContext(d.moduleName, true);
				rightSidebarContent.addEventListener('scroll', updateCtxIndicators);
				setTimeout(updateCtxIndicators, 100);

				const selected = rightSidebarContent.querySelector('.member-item-selected');
				if (selected) {
					selected.scrollIntoView({ block: 'center', behavior: 'instant' });
				}
			}

			document.getElementById('content').innerHTML = html;

			// Sync left sidebar
			const modName = d.kind === 'module' ? d.uid : d.moduleName;
			document.querySelectorAll('.module-list-ul li').forEach(li => {
				const isMatch = li.getAttribute('data-mod') === modName;
				li.classList.toggle('selected', isMatch);
				if (isMatch) {
					if (!skipSidebarScroll) {
						li.scrollIntoView({ block: 'center', behavior: 'instant' });
					}
				}
			});
		}

		init();
	</script>
</body>

</html>
